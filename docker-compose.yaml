services:
  api:
    build:
      context: .
      dockerfile: docker/go/Dockerfile.dev
    container_name: api
    ports:
      - 8080:8080
    volumes:
      - ./:/go/src/app
    env_file: .env
    tty: true
    depends_on:
      - db
  db:
    image: postgres:17
    restart: always
    container_name: db
    ports:
      - ${DB_PORT}:5432
    environment:
      TZ: Asia/Tokyo
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./docker/postgres/data:/var/lib/postgresql/data
  test_db:
    image: postgres:17
    restart: always
    container_name: test_db
    ports:
      - 5433:5432
    environment:
      TZ: Asia/Tokyo
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
